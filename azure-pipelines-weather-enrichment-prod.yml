name: $(Date:yyyyMMdd).$(Rev:r)-weather-enrichment-prod

trigger: none
pr: none

schedules:
  - cron: "*/10 * * * *"
    displayName: "Weather Enrichment every 10 min (UTC)"
    branches:
      include:
        - main
    always: true

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: Vercel-Deploy-Variables-Prod
  - name: WEATHER_ENRICHMENT_BATCH_SIZE
    value: '50'

steps:
  - script: |
      set -euo pipefail

      BASE_URL="${WEATHER_CRON_BASE_URL%/}"
      URL="$BASE_URL/api/cron/weather-enrichment?batchSize=${WEATHER_ENRICHMENT_BATCH_SIZE}"

      echo "Calling weather enrichment endpoint..."
      RESPONSE=$(curl -sS -w "\n%{http_code}" \
        -H "x-cron-secret: ${WEATHER_ENRICHMENT_CRON_SECRET}" \
        -H "Authorization: Bearer ${WEATHER_ENRICHMENT_CRON_SECRET}" \
        "$URL")

      BODY=$(printf "%s" "$RESPONSE" | sed '$d')
      CODE=$(printf "%s" "$RESPONSE" | tail -n1)

      echo "$BODY"

      if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
        echo "Request failed with HTTP $CODE"
        exit 1
      fi

      echo "Weather enrichment cron trigger succeeded (HTTP $CODE)."
    displayName: 'Trigger weather enrichment cron endpoint'
    env:
      WEATHER_CRON_BASE_URL: $(WEATHER_CRON_BASE_URL)
      WEATHER_ENRICHMENT_CRON_SECRET: $(WEATHER_ENRICHMENT_CRON_SECRET)
      WEATHER_ENRICHMENT_BATCH_SIZE: $(WEATHER_ENRICHMENT_BATCH_SIZE)
