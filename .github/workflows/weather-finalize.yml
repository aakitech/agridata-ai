name: Weather Finalize

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: weather-finalize
  cancel-in-progress: false

jobs:
  trigger-weather-finalize:
    name: Trigger weather finalize
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    env:
      WEATHER_CRON_BASE_URL: ${{ secrets.WEATHER_CRON_BASE_URL }}
      WEATHER_ENRICHMENT_CRON_SECRET: ${{ secrets.WEATHER_ENRICHMENT_CRON_SECRET }}
      WEATHER_FINALIZE_BATCH_SIZE: "50"

    steps:
      - name: Call weather finalize endpoint
        run: |
          set -euo pipefail

          BASE_URL="${WEATHER_CRON_BASE_URL%/}"
          URL="$BASE_URL/api/cron/weather-finalize?batchSize=${WEATHER_FINALIZE_BATCH_SIZE}"

          echo "Calling weather finalize endpoint..."
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -H "x-cron-secret: ${WEATHER_ENRICHMENT_CRON_SECRET}" \
            -H "Authorization: Bearer ${WEATHER_ENRICHMENT_CRON_SECRET}" \
            "$URL")

          BODY=$(printf "%s" "$RESPONSE" | sed '$d')
          CODE=$(printf "%s" "$RESPONSE" | tail -n1)

          echo "$BODY"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Request failed with HTTP $CODE"
            exit 1
          fi

          echo "Weather finalize trigger succeeded (HTTP $CODE)."
