name: Weather Enrichment

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: weather-enrichment
  cancel-in-progress: false

jobs:
  trigger-weather-enrichment:
    name: Trigger weather enrichment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    env:
      WEATHER_CRON_BASE_URL: ${{ secrets.WEATHER_CRON_BASE_URL }}
      WEATHER_ENRICHMENT_CRON_SECRET: ${{ secrets.WEATHER_ENRICHMENT_CRON_SECRET }}
      WEATHER_ENRICHMENT_BATCH_SIZE: "50"

    steps:
      - name: Call weather enrichment endpoint
        run: |
          set -euo pipefail

          BASE_URL="${WEATHER_CRON_BASE_URL%/}"
          URL="$BASE_URL/api/cron/weather-enrichment?batchSize=${WEATHER_ENRICHMENT_BATCH_SIZE}"

          echo "Calling weather enrichment endpoint..."
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -H "x-cron-secret: ${WEATHER_ENRICHMENT_CRON_SECRET}" \
            -H "Authorization: Bearer ${WEATHER_ENRICHMENT_CRON_SECRET}" \
            "$URL")

          BODY=$(printf "%s" "$RESPONSE" | sed '$d')
          CODE=$(printf "%s" "$RESPONSE" | tail -n1)

          echo "$BODY"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Request failed with HTTP $CODE"
            exit 1
          fi

          echo "Weather enrichment trigger succeeded (HTTP $CODE)."
