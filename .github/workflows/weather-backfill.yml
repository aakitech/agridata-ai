name: Weather Backfill

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Backfill limit"
        required: true
        default: "200"
      orgId:
        description: "Org ID (optional)"
        required: false
        default: ""
      from:
        description: "From date ISO (optional, e.g. 2025-12-01)"
        required: false
        default: ""
      to:
        description: "To date ISO (optional, e.g. 2026-01-31)"
        required: false
        default: ""

concurrency:
  group: weather-backfill
  cancel-in-progress: false

jobs:
  trigger-weather-backfill:
    name: Trigger weather backfill
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    env:
      WEATHER_CRON_BASE_URL: ${{ secrets.WEATHER_CRON_BASE_URL }}
      WEATHER_ENRICHMENT_CRON_SECRET: ${{ secrets.WEATHER_ENRICHMENT_CRON_SECRET }}
      LIMIT: ${{ inputs.limit }}
      ORG_ID: ${{ inputs.orgId }}
      FROM_DATE: ${{ inputs.from }}
      TO_DATE: ${{ inputs.to }}

    steps:
      - name: Verify required secrets
        run: |
          set -euo pipefail
          test -n "$WEATHER_CRON_BASE_URL" || (echo "Missing production environment secret: WEATHER_CRON_BASE_URL" && exit 1)
          test -n "$WEATHER_ENRICHMENT_CRON_SECRET" || (echo "Missing production environment secret: WEATHER_ENRICHMENT_CRON_SECRET" && exit 1)

      - name: Call weather backfill endpoint
        run: |
          set -euo pipefail

          BASE_URL="${WEATHER_CRON_BASE_URL%/}"
          URL="$BASE_URL/api/cron/weather-backfill?limit=${LIMIT}"

          if [ -n "${ORG_ID}" ]; then
            URL="$URL&orgId=${ORG_ID}"
          fi
          if [ -n "${FROM_DATE}" ]; then
            URL="$URL&from=${FROM_DATE}"
          fi
          if [ -n "${TO_DATE}" ]; then
            URL="$URL&to=${TO_DATE}"
          fi

          echo "Calling weather backfill endpoint..."
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -H "x-cron-secret: ${WEATHER_ENRICHMENT_CRON_SECRET}" \
            -H "Authorization: Bearer ${WEATHER_ENRICHMENT_CRON_SECRET}" \
            "$URL")

          BODY=$(printf "%s" "$RESPONSE" | sed '$d')
          CODE=$(printf "%s" "$RESPONSE" | tail -n1)

          echo "$BODY"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Request failed with HTTP $CODE"
            exit 1
          fi

          echo "Weather backfill trigger succeeded (HTTP $CODE)."
