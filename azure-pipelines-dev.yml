# Name format: YYYYMMDD.Revision-preview
name: $(Date:yyyyMMdd).$(Rev:r)-preview

trigger:
  branches:
    include:
      - develop

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: QA_Deploy
  displayName: 'QA / Preview Environment'
  jobs:
  - job: Build_and_Deploy
    variables:
      - group: Vercel-Deploy-Variables-Dev # Variables for QA DB and Vercel Tokens
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: 'Install Node.js'

    - script: |
        npm install -g pnpm
        pnpm install
      displayName: 'Install Dependencies'

    - script: pnpm db:migrate
      displayName: 'Run QA DB Migrations'
      env:
        DATABASE_URL: $(DATABASE_URL) # Points to your QA Supabase project

    - script: |
        npm install -g vercel
        # Pull latest Preview secrets from Vercel
        vercel pull --yes --environment=preview --token=$(VERCEL_TOKEN)
        # Build using those secrets
        vercel build --token=$(VERCEL_TOKEN)
      displayName: 'Vercel Pull & Build (QA)'
      env:
        VERCEL_ORG_ID: $(VERCEL_ORG_ID)
        VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)

    - script: |
        # Deploy and capture unique URL
        DEPLOY_URL=$(vercel deploy --prebuilt --meta githubCommitRef=develop --token=$(VERCEL_TOKEN) | tail -n 1)
        echo "##vso[task.setvariable variable=DEPLOY_URL]$DEPLOY_URL"
        echo "Build URL: $DEPLOY_URL"
      displayName: 'Vercel Deploy (Preview)'
      env:
        VERCEL_ORG_ID: $(VERCEL_ORG_ID)
        VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)

    - script: |
        # Map the fixed QA URL to this specific build
        vercel alias set $(DEPLOY_URL) agridata-ai-qa.aakitech.com --token=$(VERCEL_TOKEN) 
      displayName: 'Update QA URL Alias'
      env:
        VERCEL_ORG_ID: $(VERCEL_ORG_ID)
        VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)