trigger:
  branches:
    include:
      - develop

pool:
  vmImage: 'ubuntu-latest'

# Multi-stage pipeline with stages
stages:
- stage: PreviewDeployment
  displayName: 'Preview Deployment'
  jobs:
  - job: BuildAndDeployPreview
    displayName: 'Build and Deploy to Preview'
    variables:
      - group: Vercel-Deploy-Variables-Dev
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: 'Install Node.js'

    - script: |
        npm install -g pnpm
      displayName: 'Install pnpm'

    - script: |
        pnpm install
      displayName: 'Install dependencies'

    - script: |
        pnpm db:migrate
      displayName: 'Run database migrations'
      env:
        DATABASE_URL: $(DATABASE_URL)

    - script: |
        npm install -g vercel
      displayName: 'Install Vercel CLI'

    - script: |
        vercel pull --yes --environment=preview --token=$(VERCEL_TOKEN)
      displayName: 'Pull Vercel environment information'
      env:
        VERCEL_ORG_ID: $(VERCEL_ORG_ID)
        VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)

    - script: |
        vercel build --token=$(VERCEL_TOKEN)
      displayName: 'Build project artifacts'
      env:
        VERCEL_ORG_ID: $(VERCEL_ORG_ID)
        VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)
        DATABASE_URL: $(DATABASE_URL)
        NEXT_PUBLIC_SUPABASE_URL: $(NEXT_PUBLIC_SUPABASE_URL)
        NEXT_PUBLIC_SUPABASE_ANON_KEY: $(NEXT_PUBLIC_SUPABASE_ANON_KEY)
        SUPABASE_SERVICE_ROLE_KEY: $(SUPABASE_SERVICE_ROLE_KEY)
        TWILIO_ACCOUNT_SID: $(TWILIO_ACCOUNT_SID)
        TWILIO_AUTH_TOKEN: $(TWILIO_AUTH_TOKEN)
        TWILIO_PHONE_NUMBER: $(TWILIO_PHONE_NUMBER)
        NEXT_PUBLIC_APP_URL: $(NEXT_PUBLIC_APP_URL)

    - script: |
        vercel deploy --prebuilt --token=$(VERCEL_TOKEN)
      displayName: 'Deploy to Vercel (Preview)'
      env:
        VERCEL_ORG_ID: $(VERCEL_ORG_ID)
        VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)

# Approval gate stage
- stage: ProductionApproval
  displayName: 'Production Approval'
  dependsOn: PreviewDeployment
  condition: succeeded()
  jobs:
  - deployment: ApprovalGate
    displayName: 'Approve Production Deployment'
    environment: 'Production'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Preview deployment successful. Ready to merge to main."
            displayName: 'Approval checkpoint'

# Merge to main after approval
- stage: MergeToMain
  displayName: 'Merge to Main Branch'
  dependsOn: ProductionApproval
  condition: succeeded()
  jobs:
  - job: PromoteToProduction
    displayName: 'Merge develop to main'
    variables:
      - group: Vercel-Deploy-Variables-Dev
    steps:
    - checkout: self
      persistCredentials: true
      displayName: 'Checkout with credentials'
      
    - script: |
        git config --global user.email "azure-pipeline@aakitech.com"
        git config --global user.name "Azure Pipeline"
        
        # Fetch both branches
        git fetch origin develop
        git fetch origin main
        
        # Checkout main
        git checkout main
        
        # Merge develop into main
        git merge origin/develop --no-edit -m "chore: Auto-merge develop to main after approved preview deployment"
        
        # Push to main (this will trigger the production pipeline)
        git push https://$(System.AccessToken)@dev.azure.com/AakiTechOrg/AgriData%20AI/_git/agridata-ai main
      displayName: 'Merge develop to main and push'
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
    
    - script: |
        echo "Triggering production pipeline..."
        curl -X POST \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $(System.AccessToken)" \
          -d '{"resources":{"repositories":{"self":{"refName":"refs/heads/main"}}}}' \
          "https://dev.azure.com/AakiTechOrg/AgriData%20AI/_apis/pipelines/$(PROD_PIPELINE_ID)/runs?api-version=7.1"
      displayName: 'Trigger production pipeline'
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
        PROD_PIPELINE_ID: $(PROD_PIPELINE_ID)
      condition: succeeded()
    condition: succeeded()