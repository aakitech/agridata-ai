# Descriptive name for your pipeline runs
name: $(Date:yyyyMMdd).$(Rev:r)-preview

trigger:
  branches:
    include:
      - develop

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: QA_Deploy
  displayName: 'QA / Preview Environment'
  jobs:
  - job: Build_and_Deploy
    variables:
      - group: Vercel-Deploy-Variables-Dev # Source of Truth for DB and Vercel Tokens
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: 'Install Node.js'

    - script: |
        npm install -g pnpm
        pnpm install
      displayName: 'Install Dependencies'

    # 1. Run migrations against your QA Supabase database
    - script: pnpm db:migrate
      displayName: 'Run QA DB Migrations'
      env:
        DATABASE_URL: $(DATABASE_URL)

    - script: npx tsx scripts/seed-kutsaga-placeholder-configs.ts
      displayName: 'Seed Kutsaga Pilot Pest Configs'
      env:
        DATABASE_URL: $(DATABASE_URL)

    - script: |
        npm install -g vercel
        # vercel pull: Downloads your QA secrets from the Vercel dashboard locally
        vercel pull --yes --environment=preview --token=$(VERCEL_TOKEN)
        # vercel build: Uses those pulled secrets to create your app artifacts
        vercel build --token=$(VERCEL_TOKEN)
      displayName: 'Vercel Pull & Build'
      env:
        VERCEL_ORG_ID: $(VERCEL_ORG_ID)
        VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)

    - script: |
        set -euo pipefail
        # 2. Deploy the prebuilt app and capture only the final unique URL
        DEPLOY_URL=$(vercel deploy --prebuilt --meta githubCommitRef=develop --token=$(VERCEL_TOKEN) | tail -n 1)
        if [ -z "$DEPLOY_URL" ]; then
          echo "DEPLOY_URL is empty. Failing pipeline before alias step."
          exit 1
        fi
        # Save the URL into an Azure variable for the next step
        echo "##vso[task.setvariable variable=DEPLOY_URL]$DEPLOY_URL"
        echo "Successfully deployed unique build to: $DEPLOY_URL"
      displayName: 'Vercel Deploy (Preview)'
      env:
        VERCEL_ORG_ID: $(VERCEL_ORG_ID)
        VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)

    - script: |
        set -euo pipefail
        # 3. Map your fixed QA domain to the latest build URL
        if [ -z "$(DEPLOY_URL)" ]; then
          echo "Pipeline variable DEPLOY_URL is empty. Cannot update QA alias."
          exit 1
        fi
        vercel alias set $(DEPLOY_URL) agridata-ai-qa.aakitech.com --token=$(VERCEL_TOKEN)
        echo "QA site updated at https://agridata-ai-qa.aakitech.com"
      displayName: 'Update QA URL Alias'
      env:
        VERCEL_ORG_ID: $(VERCEL_ORG_ID)
        VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)
