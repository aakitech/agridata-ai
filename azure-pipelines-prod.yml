# azure-pipelines-prod.yml
name: $(Date:yyyyMMdd).$(Rev:r)-prod

trigger:
  branches:
    include:
      - main
  batch: true

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: Vercel-Deploy-Variables-Prod # Production DB and Vercel Tokens

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '18.x'
    displayName: 'Install Node.js'

  - script: |
      npm install -g pnpm
      pnpm install
    displayName: 'Install Dependencies'

  # Running your specific database fix/migration scripts
  - script: npx tsx scripts/diagnose-migration-state.ts
    displayName: 'Diagnose migration state'
    env:
      DATABASE_URL: $(DATABASE_URL)
    continueOnError: true

  - script: npx tsx scripts/fix-bot-state-direct.ts
    displayName: 'Fix bot_state type'
    env:
      DATABASE_URL: $(DATABASE_URL)

  - script: npx tsx scripts/mark-migrations-complete.ts
    displayName: 'Mark migrations complete'
    env:
      DATABASE_URL: $(DATABASE_URL)

  - script: pnpm db:migrate
    displayName: 'Run Production Migrations'
    env:
      DATABASE_URL: $(DATABASE_URL)
  - script: npx tsx scripts/whatsapp-bot-seed-workflows.ts
    displayName: 'Seed Workflow Configurations'
    env:
      DATABASE_URL: $(DATABASE_URL)

  - script: |
      npm install -g vercel
      # We pull 'production' env here to get the live DB and API keys
      vercel pull --yes --environment=production --token=$(VERCEL_TOKEN)
      # Build for production (injects the pulled production secrets)
      vercel build --prod --token=$(VERCEL_TOKEN)
      # Deploy the prebuilt artifacts to the live site
      vercel deploy --prebuilt --prod --token=$(VERCEL_TOKEN)
    displayName: 'Build and Deploy to Production'
    env:
      VERCEL_ORG_ID: $(VERCEL_ORG_ID)
      VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)