trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: Vercel-Deploy-Variables-Prod

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '18.x'
    displayName: 'Install Node.js'

  - script: |
      npm install -g pnpm
    displayName: 'Install pnpm'

  - script: |
      pnpm install
    displayName: 'Install dependencies'

  # Clean production database before initial setup
  # TODO: Remove this step after first successful deployment
  - script: |
      cat > reset-db.sql << 'EOF'
      DROP SCHEMA public CASCADE;
      CREATE SCHEMA public;
      GRANT ALL ON SCHEMA public TO postgres;
      GRANT ALL ON SCHEMA public TO public;
      EOF
      
      echo "Resetting production database schema..."
      PGPASSWORD=$(echo $DATABASE_URL | sed -n 's/.*:\([^@]*\)@.*/\1/p') \
      psql $DATABASE_URL -f reset-db.sql
    displayName: 'Reset database schema (initial deployment only)'
    env:
      DATABASE_URL: $(DATABASE_URL)
    condition: eq(variables['INITIAL_DEPLOYMENT'], 'true')

  # Use db:push for initial production setup (forces schema)
  # After first successful deployment, change this to: pnpm db:migrate
  - script: |
      pnpm db:push
    displayName: 'Setup database schema (initial deployment)'
    env:
      DATABASE_URL: $(DATABASE_URL)

  - script: |
      npm install -g vercel
    displayName: 'Install Vercel CLI'

  - script: |
      vercel pull --yes --environment=production --token=$(VERCEL_TOKEN)
    displayName: 'Pull Vercel environment information'
    env:
      VERCEL_ORG_ID: $(VERCEL_ORG_ID)
      VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)

  - script: |
      vercel build --prod --token=$(VERCEL_TOKEN)
    displayName: 'Build project artifacts'
    env:
      VERCEL_ORG_ID: $(VERCEL_ORG_ID)
      VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)
      DATABASE_URL: $(DATABASE_URL)
      NEXT_PUBLIC_SUPABASE_URL: $(NEXT_PUBLIC_SUPABASE_URL)
      NEXT_PUBLIC_SUPABASE_ANON_KEY: $(NEXT_PUBLIC_SUPABASE_ANON_KEY)
      SUPABASE_SERVICE_ROLE_KEY: $(SUPABASE_SERVICE_ROLE_KEY)
      TWILIO_ACCOUNT_SID: $(TWILIO_ACCOUNT_SID)
      TWILIO_AUTH_TOKEN: $(TWILIO_AUTH_TOKEN)
      TWILIO_PHONE_NUMBER: $(TWILIO_PHONE_NUMBER)
      NEXT_PUBLIC_APP_URL: $(NEXT_PUBLIC_APP_URL)

  - script: |
      vercel deploy --prebuilt --prod --token=$(VERCEL_TOKEN)
    displayName: 'Deploy to Vercel (Production)'
    env:
      VERCEL_ORG_ID: $(VERCEL_ORG_ID)
      VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)
