trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: Vercel-Deploy-Variables-Prod

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '18.x'
    displayName: 'Install Node.js'

  - script: |
      npm install -g pnpm
    displayName: 'Install pnpm'

  - script: |
      pnpm install
    displayName: 'Install dependencies'

  # Skip database migrations for initial deployment
  # Run manually after first successful deployment:
  #   pnpm db:push
  #   pnpm run seed:workflows
  #   pnpm run bootstrap-admin
  # Then uncomment this step and change INITIAL_DEPLOYMENT to false
  - script: |
      echo "Skipping database migrations for initial deployment"
      echo "Run migrations manually after first deployment"
    displayName: 'Database migration (skipped for initial deployment)'
    condition: eq(variables['INITIAL_DEPLOYMENT'], 'true')
  
  - script: |
      pnpm db:migrate
    displayName: 'Run database migrations'
    env:
      DATABASE_URL: $(DATABASE_URL)
    condition: ne(variables['INITIAL_DEPLOYMENT'], 'true')

  - script: |
      npm install -g vercel
    displayName: 'Install Vercel CLI'

  - script: |
      vercel pull --yes --environment=production --token=$(VERCEL_TOKEN)
    displayName: 'Pull Vercel environment information'
    env:
      VERCEL_ORG_ID: $(VERCEL_ORG_ID)
      VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)

  - script: |
      vercel build --prod --token=$(VERCEL_TOKEN)
    displayName: 'Build project artifacts'
    env:
      VERCEL_ORG_ID: $(VERCEL_ORG_ID)
      VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)
      DATABASE_URL: $(DATABASE_URL)
      NEXT_PUBLIC_SUPABASE_URL: $(NEXT_PUBLIC_SUPABASE_URL)
      NEXT_PUBLIC_SUPABASE_ANON_KEY: $(NEXT_PUBLIC_SUPABASE_ANON_KEY)
      SUPABASE_SERVICE_ROLE_KEY: $(SUPABASE_SERVICE_ROLE_KEY)
      TWILIO_ACCOUNT_SID: $(TWILIO_ACCOUNT_SID)
      TWILIO_AUTH_TOKEN: $(TWILIO_AUTH_TOKEN)
      TWILIO_PHONE_NUMBER: $(TWILIO_PHONE_NUMBER)
      NEXT_PUBLIC_APP_URL: $(NEXT_PUBLIC_APP_URL)

  - script: |
      vercel deploy --prebuilt --prod --token=$(VERCEL_TOKEN)
    displayName: 'Deploy to Vercel (Production)'
    env:
      VERCEL_ORG_ID: $(VERCEL_ORG_ID)
      VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)
