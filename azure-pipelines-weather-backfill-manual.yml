name: $(Date:yyyyMMdd).$(Rev:r)-weather-backfill

trigger: none
pr: none

parameters:
  - name: limit
    displayName: 'Backfill limit'
    type: string
    default: '200'
  - name: orgId
    displayName: 'Org ID (optional)'
    type: string
    default: ''
  - name: from
    displayName: 'From date ISO (optional, e.g. 2025-12-01)'
    type: string
    default: ''
  - name: to
    displayName: 'To date ISO (optional, e.g. 2026-01-31)'
    type: string
    default: ''

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: Vercel-Deploy-Variables-Prod

steps:
  - script: |
      set -euo pipefail

      BASE_URL="${WEATHER_CRON_BASE_URL%/}"
      URL="$BASE_URL/api/cron/weather-backfill?limit=${LIMIT}"

      if [ -n "${ORG_ID}" ]; then
        URL="$URL&orgId=${ORG_ID}"
      fi
      if [ -n "${FROM_DATE}" ]; then
        URL="$URL&from=${FROM_DATE}"
      fi
      if [ -n "${TO_DATE}" ]; then
        URL="$URL&to=${TO_DATE}"
      fi

      echo "Calling weather backfill endpoint..."
      RESPONSE=$(curl -sS -w "\n%{http_code}" \
        -H "x-cron-secret: ${WEATHER_ENRICHMENT_CRON_SECRET}" \
        -H "Authorization: Bearer ${WEATHER_ENRICHMENT_CRON_SECRET}" \
        "$URL")

      BODY=$(printf "%s" "$RESPONSE" | sed '$d')
      CODE=$(printf "%s" "$RESPONSE" | tail -n1)

      echo "$BODY"

      if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
        echo "Request failed with HTTP $CODE"
        exit 1
      fi

      echo "Weather backfill trigger succeeded (HTTP $CODE)."
    displayName: 'Trigger weather backfill endpoint (manual)'
    env:
      WEATHER_CRON_BASE_URL: $(WEATHER_CRON_BASE_URL)
      WEATHER_ENRICHMENT_CRON_SECRET: $(WEATHER_ENRICHMENT_CRON_SECRET)
      LIMIT: ${{ parameters.limit }}
      ORG_ID: ${{ parameters.orgId }}
      FROM_DATE: ${{ parameters.from }}
      TO_DATE: ${{ parameters.to }}
